<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task1-Image  Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
  <body>
    
    <!-- Image Gallery -->
    <div class="gallery">
        <img src="images/image1.png" alt="turtle" data-index="0">
        <img src="images/image2.png" alt="shark" data-index="1">
        <img src="images/image3.png" alt="starfish" data-index="2">
        <img src="images/image4.png" alt="sealion" data-index="3">
        <img src="images/image5.png" alt="whale" data-index="4">
        <img src="images/image6.png" alt="octopus" data-index="5">
        <img src="images/image7.png" alt="dolphine" data-index="6">
        <img src="images/image8.png" alt="seahorse" data-index="7">
        <img src="images/image9.png" alt="stingray" data-index="8">
        <img src="images/image10.png" alt="nemo" data-index="9">
    </div>

    <!-- Lightbox -->
    <div class="lightbox">
      <button class="close">&times;</button>
      <button class="prev">&#8249;</button>
      <img src="" alt="lightbox image" />
      <button class="next">&#8250;</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
